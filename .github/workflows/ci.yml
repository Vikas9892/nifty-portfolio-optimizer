name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend ────────────────────────────────────────────────────────────────
  backend-test:
    name: Backend Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov httpx ruff black isort

      - name: Lint with ruff
        run: python -m ruff check backend/app/

      - name: Check formatting with black
        run: python -m black --check backend/app/ backend/main.py

      - name: Check imports with isort
        run: python -m isort --check-only backend/app/ backend/main.py

      - name: Run backend tests with coverage
        env:
          JWT_SECRET_KEY: ci-test-secret-key-not-for-production
          JWT_ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: "15"
          REFRESH_TOKEN_EXPIRE_DAYS: "7"
          DATABASE_URL: sqlite:///data/portfolio.db
          REDIS_URL: ""
          APP_NAME: "Nifty Portfolio Optimizer"
          ENVIRONMENT: test
        run: |
          python -m pytest tests/ \
            --cov=backend/app \
            --cov-report=xml:coverage-backend.xml \
            --cov-report=term-missing \
            -q

      - name: Upload backend coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage-backend.xml
          flags: backend
          name: backend-py${{ matrix.python-version }}
        continue-on-error: true

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend-test:
    name: Frontend Tests (Node 20)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: TypeScript type check
        working-directory: frontend
        run: npm run lint

      - name: Run frontend tests with coverage
        working-directory: frontend
        run: npm run test:coverage -- --reporter=verbose

      - name: Upload frontend coverage
        uses: codecov/codecov-action@v4
        with:
          directory: frontend/coverage
          flags: frontend
          name: frontend-node20
        continue-on-error: true

  # ── Build verification ─────────────────────────────────────────────────────
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: frontend-test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        env:
          VITE_API_URL: http://localhost:8000
        run: npm run build

  # ── Backend health check ───────────────────────────────────────────────────
  backend-health:
    name: Backend Health Check
    runs-on: ubuntu-latest
    needs: backend-test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt httpx

      - name: Start server and verify /health + /ready
        env:
          JWT_SECRET_KEY: ci-health-check-secret
          JWT_ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: "15"
          REFRESH_TOKEN_EXPIRE_DAYS: "7"
          DATABASE_URL: sqlite:///data/portfolio.db
          REDIS_URL: ""
          APP_NAME: "Nifty Portfolio Optimizer"
          ENVIRONMENT: test
        run: |
          python -m uvicorn backend.main:app --host 0.0.0.0 --port 8000 &
          sleep 3
          curl --fail http://localhost:8000/health
          curl --fail http://localhost:8000/ready

  # ── Docker build validation ────────────────────────────────────────────────
  docker-build:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          push: false
          tags: nifty-backend:ci
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build frontend image (no push)
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: frontend/Dockerfile
          push: false
          tags: nifty-frontend:ci
          build-args: VITE_API_URL=
          cache-from: type=gha
          cache-to:   type=gha,mode=max
