version: 2
updates:
  # Python backend
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels: [dependencies, python]
    open-pull-requests-limit: 5

  # Node frontend
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
    labels: [dependencies, javascript]
    open-pull-requests-limit: 5

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    labels: [dependencies, ci]
