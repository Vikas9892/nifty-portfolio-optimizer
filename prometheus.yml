global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    service: nifty-portfolio-optimizer

# Phase 9: load alerting rules (M8)
rule_files:
  - /etc/prometheus/alerting_rules.yml

# Phase 9: send fired alerts to Alertmanager (M8)
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: nifty-backend
    static_configs:
      - targets:
          - backend:8000
    metrics_path: /metrics
    scrape_interval: 10s
