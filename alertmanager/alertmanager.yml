global:
  resolve_timeout: 5m
  smtp_smarthost: "smtp.gmail.com:587"
  smtp_from: "alerts@nifty-portfolio.io"
  smtp_auth_username: "${SMTP_USER}"
  smtp_auth_password: "${SMTP_PASS}"
  smtp_require_tls: true

# Silence duplicates — only re-fire after 4h if still firing
route:
  receiver: default
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - matchers:
        - severity = critical
      receiver: pagerduty
      repeat_interval: 30m
    - matchers:
        - severity = warning
      receiver: slack

receivers:
  - name: default
    email_configs:
      - to: "ops@nifty-portfolio.io"
        send_resolved: true

  - name: pagerduty
    email_configs:
      - to: "oncall@nifty-portfolio.io"
        send_resolved: true

  - name: slack
    slack_configs:
      - api_url: "${SLACK_WEBHOOK_URL}"
        channel: "#alerts"
        send_resolved: true
        title: '[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
        text: >-
          {{ range .Alerts }}
          *Alert:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          *Severity:* {{ .Labels.severity }}
          {{ end }}

inhibit_rules:
  # Suppress warnings when critical alert for same alertname fires
  - source_matchers:
      - severity = critical
    target_matchers:
      - severity = warning
    equal: ["alertname"]
