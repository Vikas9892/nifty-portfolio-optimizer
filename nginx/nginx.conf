# ── Nginx reverse proxy ───────────────────────────────────────────────────────
# Sits in front of the frontend and backend containers.
# Internet → Nginx:80 → React (frontend:80) or FastAPI (backend:8000)

upstream backend {
    server backend:8000;
    keepalive 32;
}

upstream frontend {
    server frontend:80;
}

# Rate limit zones
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

server {
    listen 80;
    server_name _;

    client_max_body_size 10m;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN"          always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header Referrer-Policy "strict-origin"       always;
    add_header X-XSS-Protection "1; mode=block"      always;

    # ── FastAPI (all /api/* and /docs /redoc /health /ready /version) ──────
    location /api/ {
        limit_req zone=api burst=10 nodelay;

        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Auth endpoints get a stricter rate limit
    location ~ ^/api/v1/auth/(login|register) {
        limit_req zone=auth burst=3 nodelay;

        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Health / docs ───────────────────────────────────────────────────────
    location ~ ^/(health|ready|version|docs|redoc|openapi.json) {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # ── React SPA (everything else) ─────────────────────────────────────────
    location / {
        proxy_pass         http://frontend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
    }
}
