# ── Nginx reverse proxy with HTTPS (Let's Encrypt / Certbot) ─────────────────
# 1. Run: certbot certonly --webroot -w /var/www/certbot -d portfolio.vikastiwari.dev
# 2. Replace this file with docker-compose override or symlink to nginx.conf
# 3. Certbot renews automatically via the certbot service below

upstream backend  { server backend:8000;  keepalive 32; }
upstream frontend { server frontend:80; }

limit_req_zone $binary_remote_addr zone=api:10m  rate=30r/m;
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

# ── HTTP: redirect all traffic to HTTPS ──────────────────────────────────────
server {
    listen 80;
    server_name portfolio.vikastiwari.dev;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name portfolio.vikastiwari.dev;

    ssl_certificate     /etc/letsencrypt/live/portfolio.vikastiwari.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/portfolio.vikastiwari.dev/privkey.pem;

    # Mozilla Intermediate config — TLS 1.2 + 1.3, strong ciphers
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;

    # HSTS — 1 year, include subdomains, preload
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN"     always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin"  always;

    client_max_body_size 10m;

    location /api/ {
        limit_req zone=api burst=10 nodelay;
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 120s;
    }

    location ~ ^/api/v1/auth/(login|register) {
        limit_req zone=auth burst=3 nodelay;
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
    }

    location ~ ^/(health|ready|version|docs|redoc|openapi.json) {
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass         http://frontend;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }
}
